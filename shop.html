<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Florida Garage Sales</title>
    <meta name="description" content="Shop quality items from garage sales across Florida. Pokemon cards, sports cards, clothing, VHS and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .shop-page { padding-top: 100px; min-height: 100vh; background: var(--gray-50); }
        .shop-header { text-align: center; margin-bottom: 40px; }
        .shop-header h1 { font-size: 2.5rem; color: var(--gray-900); }
        .shop-header p { color: var(--gray-600); margin-top: 10px; }

        .shop-filters {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px;
        }
        .filter-btn {
            padding: 8px 20px; border-radius: 50px; border: 2px solid var(--gray-300);
            background: white; cursor: pointer; font-weight: 500; font-family: inherit;
            transition: all 0.3s ease;
        }
        .filter-btn.active, .filter-btn:hover {
            border-color: var(--primary); background: var(--primary); color: white;
        }

        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; margin-bottom: 60px;
        }
        .product-item {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.3s ease;
            border: 1px solid var(--gray-200);
        }
        .product-item:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .product-item img {
            width: 100%; height: 220px; object-fit: cover;
        }
        .product-item .no-img {
            width: 100%; height: 220px; background: linear-gradient(135deg, #FF6B35, #FFD700);
            display: flex; align-items: center; justify-content: center; font-size: 4rem;
        }
        .product-body { padding: 20px; }
        .product-body h3 { font-size: 1.1rem; margin-bottom: 5px; color: var(--gray-900); }
        .product-body .product-meta { color: var(--gray-600); font-size: 0.85rem; margin-bottom: 8px; }
        .product-body .product-price { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
        .product-body .product-desc { color: var(--gray-600); font-size: 0.9rem; margin-bottom: 15px; line-height: 1.5; }
        .add-to-cart {
            width: 100%; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            font-family: inherit; font-size: 0.95rem; transition: all 0.3s ease;
        }
        .add-to-cart:hover { background: var(--primary-dark); }
        .add-to-cart:disabled { background: var(--gray-400); cursor: not-allowed; }

        /* Cart */
        .cart-icon {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: var(--primary); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(255,107,53,0.4);
            z-index: 100; transition: all 0.3s ease;
        }
        .cart-icon:hover { transform: scale(1.1); }
        .cart-badge {
            position: absolute; top: -5px; right: -5px; background: #ef4444;
            color: white; width: 22px; height: 22px; border-radius: 50%;
            font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
        }

        .cart-panel {
            position: fixed; top: 0; right: -400px; width: 380px; height: 100vh;
            background: white; box-shadow: -5px 0 25px rgba(0,0,0,0.15);
            z-index: 1001; transition: right 0.3s ease; display: flex; flex-direction: column;
        }
        .cart-panel.open { right: 0; }
        .cart-header {
            padding: 20px; border-bottom: 1px solid var(--gray-200);
            display: flex; justify-content: space-between; align-items: center;
        }
        .cart-header h2 { font-size: 1.2rem; }
        .cart-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item {
            display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100);
        }
        .cart-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .cart-item-info { flex: 1; }
        .cart-item-info h4 { font-size: 0.9rem; margin-bottom: 3px; }
        .cart-item-info .cart-item-price { color: var(--primary); font-weight: 600; }
        .cart-item-remove { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.2rem; }
        .cart-footer { padding: 20px; border-top: 1px solid var(--gray-200); }
        .cart-total { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; }
        .checkout-btn {
            width: 100%; padding: 14px; background: #2E8B57; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            font-family: inherit; font-size: 1rem;
        }
        .checkout-btn:hover { background: #246B45; }

        .cart-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1000;
        }
        .cart-overlay.open { display: block; }

        .empty-shop {
            text-align: center; padding: 80px 20px; color: var(--gray-600);
        }
        .empty-shop .icon { font-size: 4rem; margin-bottom: 15px; }

        /* Product detail modal */
        .product-modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 1002; align-items: center; justify-content: center;
        }
        .product-modal-overlay.active { display: flex; }
        .product-modal {
            background: white; border-radius: 16px; max-width: 800px; width: 95%;
            max-height: 90vh; overflow-y: auto; position: relative;
        }
        .product-modal-close {
            position: absolute; top: 12px; right: 16px; background: none; border: none;
            font-size: 1.8rem; cursor: pointer; color: var(--gray-600); z-index: 2;
        }
        .product-modal-gallery {
            position: relative; width: 100%; aspect-ratio: 4/3; overflow: hidden;
            border-radius: 16px 16px 0 0; background: #f3f4f6;
        }
        .product-modal-gallery img, .product-modal-gallery video {
            width: 100%; height: 100%; object-fit: contain; display: none;
        }
        .product-modal-gallery img.active, .product-modal-gallery video.active {
            display: block;
        }
        .gallery-nav {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4);
            color: white; border: none; width: 40px; height: 40px; border-radius: 50%;
            font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .gallery-nav.prev { left: 10px; }
        .gallery-nav.next { right: 10px; }
        .gallery-dots {
            display: flex; gap: 6px; justify-content: center; padding: 10px 0;
        }
        .gallery-dot {
            width: 10px; height: 10px; border-radius: 50%; background: var(--gray-300);
            border: none; cursor: pointer; padding: 0;
        }
        .gallery-dot.active { background: var(--primary); }
        .product-modal-body { padding: 24px; }
        .product-modal-body h2 { margin-bottom: 6px; font-size: 1.5rem; }
        .product-modal-body .price { color: var(--primary); font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
        .product-modal-body .meta { color: var(--gray-600); font-size: 0.9rem; margin-bottom: 12px; }
        .product-modal-body .desc { color: var(--gray-700); line-height: 1.6; margin-bottom: 20px; }
        .img-count {
            position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6);
            color: white; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
        }

        .success-banner {
            background: #d1fae5; color: #065f46; padding: 15px; text-align: center;
            font-weight: 500; border-radius: 8px; margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .cart-panel { width: 100%; right: -100%; }
            .shop-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="/" class="logo">
                <img src="logo.png" alt="Florida Garage Sales" class="logo-img">
            </a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/#about">About</a></li>
                <li><a href="/#services">Services</a></li>
                <li><a href="/shop.html" style="color:var(--primary);">Shop</a></li>
                <li><a href="/#find-sales">Find Sales</a></li>
                <li><a href="/#contact" class="btn btn-nav">Contact Us</a></li>
            </ul>
        </div>
    </nav>

    <section class="shop-page">
        <div class="container">
            <div id="success-msg"></div>
            <div class="shop-header">
                <h1>Shop Our <span class="highlight">Finds</span></h1>
                <p>Quality items from garage sales across Florida — new treasures added weekly!</p>
            </div>

            <div class="shop-filters" id="filters">
                <button class="filter-btn active" data-category="all">All Items</button>
                <button class="filter-btn" data-category="Pokemon Cards">Pokemon Cards</button>
                <button class="filter-btn" data-category="Sports Cards">Sports Cards</button>
                <button class="filter-btn" data-category="Clothing">Clothing</button>
                <button class="filter-btn" data-category="VHS Tapes">VHS Tapes</button>
                <button class="filter-btn" data-category="Electronics">Electronics</button>
                <button class="filter-btn" data-category="Home Goods">Home Goods</button>
                <button class="filter-btn" data-category="Collectibles">Collectibles</button>
                <button class="filter-btn" data-category="Other">Other</button>
            </div>

            <div id="products-container" class="products-grid"></div>
        </div>
    </section>

    <!-- Cart Icon -->
    <div class="cart-icon" onclick="toggleCart()">
        🛒
        <span class="cart-badge" id="cart-badge">0</span>
    </div>

    <!-- Cart Panel -->
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-panel" id="cart-panel">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="cart-close" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://florida-garage-sales-api.fly.dev';
        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('fgs_cart') || '[]');

        // Check for success/cancel
        const params = new URLSearchParams(window.location.search);
        if (params.get('success') === 'true') {
            document.getElementById('success-msg').innerHTML = '<div class="success-banner">🎉 Payment successful! Thank you for your order. We\'ll ship it soon!</div>';
            localStorage.removeItem('fgs_cart');
            cart = [];
        }

        updateCartUI();
        loadShopProducts();

        function loadShopProducts() {
            fetch(`${API_URL}/api/products`)
                .then(r => r.json())
                .then(products => {
                    allProducts = products;
                    renderProducts(products);
                })
                .catch(() => {
                    document.getElementById('products-container').innerHTML = 
                        '<div class="empty-shop"><div class="icon">🏪</div><p>Store coming soon! Check back for amazing finds.</p></div>';
                });
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            if (!products.length) {
                container.innerHTML = '<div class="empty-shop"><div class="icon">🔍</div><p>No items in this category yet. Check back soon!</p></div>';
                return;
            }
            container.innerHTML = products.map(p => {
                const totalMedia = 1 + (p.image_urls ? p.image_urls.length : 0) + (p.video_url ? 1 : 0);
                return `
                <div class="product-item">
                    <div style="position:relative;cursor:pointer;" onclick="openProductDetail(${p.id})">
                        ${p.image_url 
                            ? `<img src="${API_URL}${p.image_url}" alt="${p.name}">` 
                            : `<div class="no-img">🏷️</div>`}
                        ${totalMedia > 1 ? `<span class="img-count">${totalMedia} photos${p.video_url ? ' + video' : ''}</span>` : ''}
                    </div>
                    <div class="product-body">
                        <h3 style="cursor:pointer;" onclick="openProductDetail(${p.id})">${p.name}</h3>
                        <div class="product-meta">${p.category} · ${p.condition}</div>
                        <div class="product-price">$${p.price.toFixed(2)}</div>
                        ${p.description ? `<div class="product-desc">${p.description.substring(0, 100)}${p.description.length > 100 ? '...' : ''}</div>` : ''}
                        <button class="add-to-cart" onclick="addToCart(${p.id})" ${p.quantity < 1 ? 'disabled' : ''}>
                            ${p.quantity < 1 ? 'Sold Out' : 'Add to Cart'}
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        // Filters
        document.getElementById('filters').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            const category = e.target.dataset.category;
            if (category === 'all') {
                renderProducts(allProducts);
            } else {
                renderProducts(allProducts.filter(p => p.category === category));
            }
        });

        // Cart functions
        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            const existing = cart.find(i => i.product_id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ product_id: productId, quantity: 1, name: product.name, price: product.price, image_url: product.image_url });
            }
            saveCart();
            updateCartUI();
            // Auto-open cart panel
            document.getElementById('cart-panel').classList.add('open');
            document.getElementById('cart-overlay').classList.add('open');
            // Button feedback
            const btn = event.target;
            const origText = btn.textContent;
            btn.textContent = 'Added!';
            btn.style.background = '#2E8B57';
            setTimeout(() => { btn.textContent = origText; btn.style.background = ''; }, 1200);
        }

        function removeFromCart(productId) {
            cart = cart.filter(i => i.product_id !== productId);
            saveCart();
            updateCartUI();
        }

        function saveCart() {
            localStorage.setItem('fgs_cart', JSON.stringify(cart));
        }

        function updateCartUI() {
            document.getElementById('cart-badge').textContent = cart.reduce((sum, i) => sum + i.quantity, 0);
            const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`;
            
            const itemsEl = document.getElementById('cart-items');
            if (!cart.length) {
                itemsEl.innerHTML = '<div style="text-align:center;padding:40px;color:#6b7280;">Your cart is empty</div>';
                return;
            }
            itemsEl.innerHTML = cart.map(item => `
                <div class="cart-item">
                    ${item.image_url 
                        ? `<img src="${API_URL}${item.image_url}" alt="${item.name}">` 
                        : `<div style="width:60px;height:60px;background:#fef3c7;border-radius:8px;display:flex;align-items:center;justify-content:center;">🏷️</div>`}
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <div class="cart-item-price">$${item.price.toFixed(2)} × ${item.quantity}</div>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart(${item.product_id})">×</button>
                </div>
            `).join('');
        }

        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('open');
        }

        function checkout() {
            if (!cart.length) return alert('Your cart is empty!');
            
            fetch(`${API_URL}/api/checkout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: cart.map(i => ({ product_id: i.product_id, quantity: i.quantity })) })
            })
                .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
                .then(({ ok, data }) => {
                    if (!ok) throw new Error(data.detail || 'Checkout failed');
                    window.location.href = data.checkout_url;
                })
                .catch(e => alert('Checkout error: ' + e.message));
        }

        // Product detail modal
        let currentSlide = 0;
        let mediaItems = [];

        function openProductDetail(productId) {
            const p = allProducts.find(x => x.id === productId);
            if (!p) return;

            mediaItems = [];
            if (p.image_url) mediaItems.push({ type: 'image', url: `${API_URL}${p.image_url}` });
            if (p.image_urls) p.image_urls.forEach(u => mediaItems.push({ type: 'image', url: `${API_URL}${u}` }));
            if (p.video_url) mediaItems.push({ type: 'video', url: `${API_URL}${p.video_url}` });

            if (!mediaItems.length) mediaItems.push({ type: 'none' });

            const gallery = document.getElementById('detail-gallery');
            gallery.innerHTML = mediaItems.map((m, i) => {
                if (m.type === 'image') return `<img src="${m.url}" class="${i === 0 ? 'active' : ''}" alt="">`;
                if (m.type === 'video') return `<video src="${m.url}" class="${i === 0 ? 'active' : ''}" controls></video>`;
                return `<div class="no-img active" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;">🏷️</div>`;
            }).join('');

            if (mediaItems.length > 1) {
                gallery.innerHTML += `<button class="gallery-nav prev" onclick="changeSlide(-1)">‹</button><button class="gallery-nav next" onclick="changeSlide(1)">›</button>`;
            }

            const dots = document.getElementById('detail-dots');
            dots.innerHTML = mediaItems.length > 1 ? mediaItems.map((m, i) =>
                `<button class="gallery-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></button>`
            ).join('') : '';

            document.getElementById('detail-name').textContent = p.name;
            document.getElementById('detail-price').textContent = `$${p.price.toFixed(2)}`;
            document.getElementById('detail-meta').textContent = `${p.category} · ${p.condition}`;
            document.getElementById('detail-desc').textContent = p.description || '';
            document.getElementById('detail-add-btn').onclick = () => addToCart(p.id);
            document.getElementById('detail-add-btn').disabled = p.quantity < 1;
            document.getElementById('detail-add-btn').textContent = p.quantity < 1 ? 'Sold Out' : 'Add to Cart';

            currentSlide = 0;
            document.getElementById('product-detail-modal').classList.add('active');
        }

        function closeProductDetail() {
            document.getElementById('product-detail-modal').classList.remove('active');
            // Pause any playing videos
            document.querySelectorAll('#detail-gallery video').forEach(v => v.pause());
        }

        function changeSlide(dir) {
            currentSlide = (currentSlide + dir + mediaItems.length) % mediaItems.length;
            updateGallery();
        }

        function goToSlide(idx) {
            currentSlide = idx;
            updateGallery();
        }

        function updateGallery() {
            const items = document.querySelectorAll('#detail-gallery > img, #detail-gallery > video, #detail-gallery > div');
            items.forEach((el, i) => {
                el.classList.toggle('active', i === currentSlide);
                if (el.tagName === 'VIDEO' && i !== currentSlide) el.pause();
            });
            document.querySelectorAll('.gallery-dot').forEach((d, i) => d.classList.toggle('active', i === currentSlide));
        }

        // Nav toggle for mobile
        document.getElementById('nav-toggle').addEventListener('click', () => {
            document.getElementById('nav-links').classList.toggle('active');
        });
    </script>

    <!-- Product Detail Modal -->
    <div class="product-modal-overlay" id="product-detail-modal" onclick="if(event.target===this)closeProductDetail()">
        <div class="product-modal">
            <button class="product-modal-close" onclick="closeProductDetail()">&times;</button>
            <div class="product-modal-gallery" id="detail-gallery"></div>
            <div class="gallery-dots" id="detail-dots"></div>
            <div class="product-modal-body">
                <h2 id="detail-name"></h2>
                <div class="price" id="detail-price"></div>
                <div class="meta" id="detail-meta"></div>
                <div class="desc" id="detail-desc"></div>
                <button class="add-to-cart" id="detail-add-btn">Add to Cart</button>
            </div>
        </div>
    </div>
</body>
</html>
