<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Florida Garage Sales</title>
    <meta name="description" content="Shop quality items from garage sales across Florida. Pokemon cards, sports cards, clothing, VHS and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@proton/web-sdk@5.1.0-rc-0/lib/proton-web-sdk.bundle.js"></script>
    <style>
        .shop-page { padding-top: 100px; min-height: 100vh; background: var(--gray-50); }
        .shop-header { text-align: center; margin-bottom: 40px; }
        .shop-header h1 { font-size: 2.5rem; color: var(--gray-900); }
        .shop-header p { color: var(--gray-600); margin-top: 10px; }

        .shop-filters {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px;
        }
        .filter-btn {
            padding: 8px 20px; border-radius: 50px; border: 2px solid var(--gray-300);
            background: white; cursor: pointer; font-weight: 500; font-family: inherit;
            transition: all 0.3s ease;
        }
        .filter-btn.active, .filter-btn:hover {
            border-color: var(--primary); background: var(--primary); color: white;
        }

        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; margin-bottom: 60px;
        }
        .product-item {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.3s ease;
            border: 1px solid var(--gray-200);
        }
        .product-item:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .product-item img {
            width: 100%; height: 220px; object-fit: cover;
        }
        .product-item .no-img {
            width: 100%; height: 220px; background: linear-gradient(135deg, #FF6B35, #FFD700);
            display: flex; align-items: center; justify-content: center; font-size: 4rem;
        }
        .product-body { padding: 20px; }
        .product-body h3 { font-size: 1.1rem; margin-bottom: 5px; color: var(--gray-900); }
        .product-body .product-meta { color: var(--gray-600); font-size: 0.85rem; margin-bottom: 8px; }
        .product-body .product-price { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
        .product-body .product-desc { color: var(--gray-600); font-size: 0.9rem; margin-bottom: 15px; line-height: 1.5; }
        .add-to-cart {
            width: 100%; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            font-family: inherit; font-size: 0.95rem; transition: all 0.3s ease;
        }
        .add-to-cart:hover { background: var(--primary-dark); }
        .add-to-cart:disabled { background: var(--gray-400); cursor: not-allowed; }

        /* Cart */
        .cart-icon {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: var(--primary); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(255,107,53,0.4);
            z-index: 100; transition: all 0.3s ease;
        }
        .cart-icon:hover { transform: scale(1.1); }
        .cart-badge {
            position: absolute; top: -5px; right: -5px; background: #ef4444;
            color: white; width: 22px; height: 22px; border-radius: 50%;
            font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
        }

        .cart-panel {
            position: fixed; top: 0; right: -400px; width: 380px; height: 100vh;
            background: white; box-shadow: -5px 0 25px rgba(0,0,0,0.15);
            z-index: 1001; transition: right 0.3s ease; display: flex; flex-direction: column;
        }
        .cart-panel.open { right: 0; }
        .cart-header {
            padding: 20px; border-bottom: 1px solid var(--gray-200);
            display: flex; justify-content: space-between; align-items: center;
        }
        .cart-header h2 { font-size: 1.2rem; }
        .cart-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item {
            display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100);
        }
        .cart-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .cart-item-info { flex: 1; }
        .cart-item-info h4 { font-size: 0.9rem; margin-bottom: 3px; }
        .cart-item-info .cart-item-price { color: var(--primary); font-weight: 600; }
        .cart-item-remove { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.2rem; }
        .cart-footer { padding: 20px; border-top: 1px solid var(--gray-200); }
        .cart-total { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; }
        .checkout-btn {
            width: 100%; padding: 14px; background: #2E8B57; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            font-family: inherit; font-size: 1rem;
        }
        .checkout-btn:hover { background: #246B45; }

        .cart-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1000;
        }
        .cart-overlay.open { display: block; }

        .empty-shop {
            text-align: center; padding: 80px 20px; color: var(--gray-600);
        }
        .empty-shop .icon { font-size: 4rem; margin-bottom: 15px; }

        /* Wallet connect */
        .wallet-bar {
            display: flex; align-items: center; gap: 12px;
            justify-content: center; margin-bottom: 20px; flex-wrap: wrap;
        }
        .wallet-connect-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 24px; border-radius: 50px; border: 2px solid #7B2FFF;
            background: linear-gradient(135deg, #7B2FFF, #5B1FCC); color: white;
            cursor: pointer; font-weight: 600; font-family: inherit; font-size: 0.9rem;
            transition: all 0.3s ease; box-shadow: 0 2px 10px rgba(123,47,255,0.3);
        }
        .wallet-connect-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(123,47,255,0.4); }
        .wallet-connect-btn .wallet-icon { font-size: 1.1rem; }
        .wallet-info {
            display: inline-flex; align-items: center; gap: 10px;
            background: white; border: 2px solid #7B2FFF; border-radius: 50px;
            padding: 6px 16px; font-size: 0.9rem; color: #333;
        }
        .wallet-info .wallet-name {
            font-weight: 700; color: #7B2FFF;
        }
        .wallet-info .wallet-balance {
            background: #f3f0ff; padding: 3px 10px; border-radius: 20px;
            font-weight: 600; color: #5B1FCC; font-size: 0.8rem;
        }
        .wallet-disconnect {
            background: none; border: none; color: #ef4444; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; padding: 2px 8px;
        }
        .wallet-disconnect:hover { text-decoration: underline; }

        /* Crypto checkout */
        .checkout-options { display: flex; flex-direction: column; gap: 10px; }
        .checkout-btn-crypto {
            width: 100%; padding: 14px; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            font-family: inherit; font-size: 1rem;
            background: linear-gradient(135deg, #7B2FFF, #5B1FCC);
            transition: all 0.3s ease;
        }
        .checkout-btn-crypto:hover { opacity: 0.9; transform: translateY(-1px); }
        .checkout-btn-crypto:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .checkout-divider {
            text-align: center; color: var(--gray-400); font-size: 0.8rem;
            position: relative; margin: 2px 0;
        }
        .checkout-divider::before, .checkout-divider::after {
            content: ''; position: absolute; top: 50%; width: 40%;
            height: 1px; background: var(--gray-200);
        }
        .checkout-divider::before { left: 0; }
        .checkout-divider::after { right: 0; }
        .crypto-status {
            text-align: center; padding: 8px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 500; margin-top: 5px;
        }
        .crypto-status.success { background: #d1fae5; color: #065f46; }
        .crypto-status.error { background: #fee2e2; color: #991b1b; }
        .crypto-status.pending { background: #fef3c7; color: #92400e; }

        .success-banner {
            background: #d1fae5; color: #065f46; padding: 15px; text-align: center;
            font-weight: 500; border-radius: 8px; margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .cart-panel { width: 100%; right: -100%; }
            .shop-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="/" class="logo">
                <img src="logo.png" alt="Florida Garage Sales" class="logo-img">
            </a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/#about">About</a></li>
                <li><a href="/#services">Services</a></li>
                <li><a href="/shop.html" style="color:var(--primary);">Shop</a></li>
                <li><a href="/#find-sales">Find Sales</a></li>
                <li><a href="/#contact" class="btn btn-nav">Contact Us</a></li>
            </ul>
        </div>
    </nav>

    <section class="shop-page">
        <div class="container">
            <div id="success-msg"></div>
            <div id="wallet-bar" class="wallet-bar">
                <button class="wallet-connect-btn" onclick="connectWallet()">
                    <span class="wallet-icon">&#x26A1;</span> Connect Wallet
                </button>
            </div>

            <div class="shop-header">
                <h1>Shop Our <span class="highlight">Finds</span></h1>
                <p>Quality items from garage sales across Florida — new treasures added weekly!</p>
            </div>

            <div class="shop-filters" id="filters">
                <button class="filter-btn active" data-category="all">All Items</button>
                <button class="filter-btn" data-category="Pokemon Cards">Pokemon Cards</button>
                <button class="filter-btn" data-category="Sports Cards">Sports Cards</button>
                <button class="filter-btn" data-category="Clothing">Clothing</button>
                <button class="filter-btn" data-category="VHS Tapes">VHS Tapes</button>
                <button class="filter-btn" data-category="Electronics">Electronics</button>
                <button class="filter-btn" data-category="Home Goods">Home Goods</button>
                <button class="filter-btn" data-category="Collectibles">Collectibles</button>
                <button class="filter-btn" data-category="Other">Other</button>
            </div>

            <div id="products-container" class="products-grid"></div>
        </div>
    </section>

    <!-- Cart Icon -->
    <div class="cart-icon" onclick="toggleCart()">
        🛒
        <span class="cart-badge" id="cart-badge">0</span>
    </div>

    <!-- Cart Panel -->
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-panel" id="cart-panel">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="cart-close" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <div class="checkout-options">
                <button class="checkout-btn-crypto" id="crypto-checkout-btn" onclick="cryptoCheckout()" style="display:none;">Pay with Crypto (XPR)</button>
                <div class="checkout-divider" id="checkout-divider" style="display:none;">or</div>
                <button class="checkout-btn" onclick="checkout()">Pay with Card (Stripe)</button>
            </div>
            <div id="crypto-status"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://florida-garage-sales-api.fly.dev';
        const XPR_CHAIN_ID = '384da888112027f0321850a169f737c33e53b388aad48b5adace4bab97f437e0';
        const XPR_ENDPOINTS = ['https://proton.eosusa.io', 'https://api.protonnz.com', 'https://proton.cryptolions.io'];
        const TOKEN_CONTRACT = 'eosio.token';
        const TOKEN_SYMBOL = 'XPR';
        const TOKEN_PRECISION = 4;
        const STORE_ACCOUNT = 'fgsstore'; // FGS store XPR account

        let xprLink = null;
        let xprSession = null;
        let walletBalances = {};

        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('fgs_cart') || '[]');

        // Check for success/cancel
        const params = new URLSearchParams(window.location.search);
        if (params.get('success') === 'true') {
            document.getElementById('success-msg').innerHTML = '<div class="success-banner">🎉 Payment successful! Thank you for your order. We\'ll ship it soon!</div>';
            localStorage.removeItem('fgs_cart');
            cart = [];
        }

        updateCartUI();
        loadShopProducts();
        restoreWalletSession();

        function loadShopProducts() {
            fetch(`${API_URL}/api/products`)
                .then(r => r.json())
                .then(products => {
                    allProducts = products;
                    renderProducts(products);
                })
                .catch(() => {
                    document.getElementById('products-container').innerHTML = 
                        '<div class="empty-shop"><div class="icon">🏪</div><p>Store coming soon! Check back for amazing finds.</p></div>';
                });
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            if (!products.length) {
                container.innerHTML = '<div class="empty-shop"><div class="icon">🔍</div><p>No items in this category yet. Check back soon!</p></div>';
                return;
            }
            container.innerHTML = products.map(p => `
                <div class="product-item">
                    ${p.image_url 
                        ? `<img src="${API_URL}${p.image_url}" alt="${p.name}">` 
                        : `<div class="no-img">🏷️</div>`}
                    <div class="product-body">
                        <h3>${p.name}</h3>
                        <div class="product-meta">${p.category} · ${p.condition}</div>
                        <div class="product-price">$${p.price.toFixed(2)}</div>
                        ${p.description ? `<div class="product-desc">${p.description.substring(0, 100)}${p.description.length > 100 ? '...' : ''}</div>` : ''}
                        <button class="add-to-cart" onclick="addToCart(${p.id})" ${p.quantity < 1 ? 'disabled' : ''}>
                            ${p.quantity < 1 ? 'Sold Out' : 'Add to Cart'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Filters
        document.getElementById('filters').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            const category = e.target.dataset.category;
            if (category === 'all') {
                renderProducts(allProducts);
            } else {
                renderProducts(allProducts.filter(p => p.category === category));
            }
        });

        // Cart functions
        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            const existing = cart.find(i => i.product_id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ product_id: productId, quantity: 1, name: product.name, price: product.price, image_url: product.image_url });
            }
            saveCart();
            updateCartUI();
        }

        function removeFromCart(productId) {
            cart = cart.filter(i => i.product_id !== productId);
            saveCart();
            updateCartUI();
        }

        function saveCart() {
            localStorage.setItem('fgs_cart', JSON.stringify(cart));
        }

        function updateCartUI() {
            document.getElementById('cart-badge').textContent = cart.reduce((sum, i) => sum + i.quantity, 0);
            const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`;
            
            const itemsEl = document.getElementById('cart-items');
            if (!cart.length) {
                itemsEl.innerHTML = '<div style="text-align:center;padding:40px;color:#6b7280;">Your cart is empty</div>';
                return;
            }
            itemsEl.innerHTML = cart.map(item => `
                <div class="cart-item">
                    ${item.image_url 
                        ? `<img src="${API_URL}${item.image_url}" alt="${item.name}">` 
                        : `<div style="width:60px;height:60px;background:#fef3c7;border-radius:8px;display:flex;align-items:center;justify-content:center;">🏷️</div>`}
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <div class="cart-item-price">$${item.price.toFixed(2)} × ${item.quantity}</div>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart(${item.product_id})">×</button>
                </div>
            `).join('');
        }

        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('open');
        }

        // === XPR NETWORK / WEBAUTH INTEGRATION ===

        async function connectWallet() {
            try {
                const result = await ProtonWebSDK({
                    linkOptions: {
                        chainId: XPR_CHAIN_ID,
                        endpoints: XPR_ENDPOINTS,
                        restoreSession: false,
                    },
                    transportOptions: {
                        requestAccount: 'fgsstore',
                    },
                    selectorOptions: {
                        appName: 'Florida Garage Sales',
                        appLogo: 'https://www.floridagaragesales.com/logo.png',
                        enabledWalletTypes: ['webauth', 'proton', 'anchor'],
                    },
                });

                if (result && result.session) {
                    xprLink = result.link;
                    xprSession = result.session;
                    onWalletConnected();
                }
            } catch (e) {
                console.error('Wallet connect error:', e);
            }
        }

        async function restoreWalletSession() {
            try {
                const result = await ProtonWebSDK({
                    linkOptions: {
                        chainId: XPR_CHAIN_ID,
                        endpoints: XPR_ENDPOINTS,
                        restoreSession: true,
                    },
                    transportOptions: {
                        requestAccount: 'fgsstore',
                    },
                    selectorOptions: {
                        appName: 'Florida Garage Sales',
                        appLogo: 'https://www.floridagaragesales.com/logo.png',
                    },
                });

                if (result && result.session) {
                    xprLink = result.link;
                    xprSession = result.session;
                    onWalletConnected();
                }
            } catch (e) {
                console.log('No saved session to restore');
            }
        }

        async function disconnectWallet() {
            if (xprLink && xprSession) {
                try {
                    await xprLink.removeSession('fgsstore', xprSession.auth);
                } catch (e) { console.log(e); }
            }
            xprLink = null;
            xprSession = null;
            walletBalances = {};
            updateWalletUI();
        }

        async function onWalletConnected() {
            updateWalletUI();
            await fetchBalances();
        }

        async function fetchBalances() {
            if (!xprSession) return;
            const account = xprSession.auth.actor;
            try {
                const resp = await fetch(XPR_ENDPOINTS[0] + '/v1/chain/get_currency_balance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: TOKEN_CONTRACT, account: account, symbol: TOKEN_SYMBOL }),
                });
                const data = await resp.json();
                if (data && data.length > 0) {
                    walletBalances[TOKEN_SYMBOL] = data[0];
                } else {
                    walletBalances[TOKEN_SYMBOL] = `0.${'0'.repeat(TOKEN_PRECISION)} ${TOKEN_SYMBOL}`;
                }
            } catch (e) {
                console.error('Balance fetch error:', e);
            }
            updateWalletUI();
        }

        function updateWalletUI() {
            const walletBar = document.getElementById('wallet-bar');
            if (!xprSession) {
                walletBar.innerHTML = `
                    <button class="wallet-connect-btn" onclick="connectWallet()">
                        <span class="wallet-icon">&#x26A1;</span> Connect Wallet
                    </button>`;
                document.getElementById('crypto-checkout-btn').style.display = 'none';
                document.getElementById('checkout-divider').style.display = 'none';
                return;
            }

            const account = xprSession.auth.actor;
            const xprBal = walletBalances[TOKEN_SYMBOL] || 'Loading...';

            walletBar.innerHTML = `
                <div class="wallet-info">
                    <span class="wallet-name">@${account}</span>
                    <span class="wallet-balance">${xprBal}</span>
                    <button class="wallet-disconnect" onclick="disconnectWallet()">Disconnect</button>
                </div>`;

            document.getElementById('crypto-checkout-btn').style.display = 'block';
            document.getElementById('checkout-divider').style.display = 'block';
        }

        async function cryptoCheckout() {
            if (!xprSession) return alert('Please connect your wallet first.');
            if (!cart.length) return alert('Your cart is empty!');

            const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            const quantity = total.toFixed(TOKEN_PRECISION) + ' ' + TOKEN_SYMBOL;
            const memo = 'FGS Order: ' + cart.map(i => i.name + ' x' + i.quantity).join(', ');

            const statusEl = document.getElementById('crypto-status');
            statusEl.className = 'crypto-status pending';
            statusEl.textContent = 'Awaiting wallet approval...';

            const btn = document.getElementById('crypto-checkout-btn');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                const result = await xprSession.transact({
                    actions: [{
                        account: TOKEN_CONTRACT,
                        name: 'transfer',
                        authorization: [{
                            actor: xprSession.auth.actor,
                            permission: xprSession.auth.permission,
                        }],
                        data: {
                            from: xprSession.auth.actor,
                            to: STORE_ACCOUNT,
                            quantity: quantity,
                            memo: memo,
                        },
                    }],
                }, { broadcast: true });

                const txId = result.processed ? result.processed.id : (result.transaction_id || 'confirmed');

                // Record the crypto order on our backend
                try {
                    await fetch(`${API_URL}/api/crypto-order`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            items: cart.map(i => ({ product_id: i.product_id, quantity: i.quantity })),
                            tx_id: txId,
                            payer: xprSession.auth.actor,
                            token: TOKEN_SYMBOL,
                            amount: total,
                        }),
                    });
                } catch (e) { console.log('Backend order recording:', e); }

                statusEl.className = 'crypto-status success';
                statusEl.innerHTML = `Payment successful! TX: <a href="https://explorer.xprnetwork.org/transaction/${txId}" target="_blank" style="color:#065f46;text-decoration:underline;">${txId.substring(0, 12)}...</a>`;

                localStorage.removeItem('fgs_cart');
                cart = [];
                updateCartUI();
                await fetchBalances();

            } catch (e) {
                console.error('Crypto checkout error:', e);
                statusEl.className = 'crypto-status error';
                statusEl.textContent = 'Payment failed: ' + (e.message || 'Transaction rejected');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Pay with ' + TOKEN_SYMBOL;
            }
        }

        function checkout() {
            if (!cart.length) return alert('Your cart is empty!');
            
            fetch(`${API_URL}/api/checkout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: cart.map(i => ({ product_id: i.product_id, quantity: i.quantity })) })
            })
                .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
                .then(({ ok, data }) => {
                    if (!ok) throw new Error(data.detail || 'Checkout failed');
                    window.location.href = data.checkout_url;
                })
                .catch(e => alert('Checkout error: ' + e.message));
        }

        // Nav toggle for mobile
        document.getElementById('nav-toggle').addEventListener('click', () => {
            document.getElementById('nav-links').classList.toggle('active');
        });
    </script>
</body>
</html>
